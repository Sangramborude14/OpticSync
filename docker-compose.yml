version: "3.8"

services:
  mongodb:
    image: mongo:latest
    container_name: optisync_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: optisync_backend
    ports:
      - "5001:5001"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/optisync-history
      # Add your GEMINI_API_KEY to backend/.env if you are running outside of docker-compose,
      # or set it here / in a .env file at the root.
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
    restart: unless-stopped

  web-app:
    build:
      context: ./web-app
      dockerfile: Dockerfile
    container_name: optisync_web_app
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data:
